name: Main CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/472-cicd:latest \
                      -t ${{ secrets.DOCKER_USERNAME }}/472-cicd:${{ env.VERSION }} \
                      --build-arg NEXT_PUBLIC_STUDENT_ID=6510405482 \
                      .
          
          docker push ${{ secrets.DOCKER_USERNAME }}/472-cicd:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/472-cicd:${{ env.VERSION }}

      - name: Create GitHub Release
        run: gh release create v${{ env.VERSION }} --title "Release v${{ env.VERSION }}" --generate-notes
